name: Repository Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shell-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shell script syntax
        run: |
          set -eu
          find . -type f -name '*.sh' | while read -r file; do
            shebang=$(head -n 1 "$file" || true)
            case "$shebang" in
              '#!/bin/sh'|'#!/usr/bin/env sh')
                echo "sh -n $file"
                sh -n "$file"
                ;;
              *)
                echo "bash -n $file"
                bash -n "$file"
                ;;
            esac
          done

  terraform-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive tf-example

  terraform-plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tf-example

    env:
      AWS_ACCESS_KEY_ID: ci-placeholder
      AWS_SECRET_ACCESS_KEY: ci-placeholder
      AWS_DEFAULT_REGION: eu-central-1
      AWS_EC2_METADATA_DISABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init -backend=false -input=false

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Run speculative Terraform plan
        run: >
          terraform plan
          -input=false
          -lock=false
          -refresh=false
          -no-color
          -var=offline_plan_mode=true
          -var=ami_id=ami-00000000000000000
          -var=key_name=ci-placeholder
